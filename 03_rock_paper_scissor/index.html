<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Document</title>
</head>
<body>
  <p class="game-title">Rock Paper Scissor Game</p>
  <div class="play-area">
    <div class="play-btns">
      <button class="play-btn rock" onclick="
      userChoice = '👊';
      userPlay();
      ">👊</button>
      
      <button class="play-btn paper" onclick="
      userChoice = '✋';
      userPlay();
      ">✋</button>
  
      <button class="play-btn scissor" onclick="
      userChoice = '✌️';
      userPlay();
      ">✌️</button>
    </div>
  
    <div class="result-display">
      <p id="choice"></p>
      <p id="result"></p>
    </div>
  
    <div class="score-board">
      <p class="title">Score</p>
      <p>Wins: <span id="score-win"></span></p>
      <p>Losses: <span id="score-lose"></span></p>
      <p>Ties: <span id="score-tie"></span></p>
    </div>
  
    <Script src="script.js"></Script>
    <button class="reset-btn" onclick="resetScore();">Reset Score</button>
  </div>

</body>
</html>
